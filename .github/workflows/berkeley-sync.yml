name: Berkeley nightly sync

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run prisma:generate
      - run: npx prisma migrate deploy

      - name: Chunked catalog sync (day of week rotation)
        run: |
          DOW=$(date -u +%u)
          case $DOW in
            1) DEPT_CHUNK="--department-limit=60" ;;
            2) DEPT_CHUNK="--department-limit=60" ;;
            3) DEPT_CHUNK="--department-limit=57" ;;
            4) DEPT_CHUNK="--program-limit=80 --course-limit=400" ;;
            5) DEPT_CHUNK="--program-limit=80 --course-limit=400" ;;
            6) DEPT_CHUNK="--program-limit=80 --course-limit=400" ;;
            7) DEPT_CHUNK="--discover --full" ;;
            *) DEPT_CHUNK="--department-limit=50 --course-limit=200 --program-limit=40" ;;
          esac
          npm run berkeley:sync:official -- --discover $DEPT_CHUNK
