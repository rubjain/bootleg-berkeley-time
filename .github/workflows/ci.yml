name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: coursemap
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/coursemap
      SESSION_SECRET: ci-test-session-secret
      NEXT_PUBLIC_APP_URL: http://localhost:3100
      ALLOW_MOCK_FALLBACK: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run prisma:migrate -- --name ci
      - run: npm run prisma:seed
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
